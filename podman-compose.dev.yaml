# Fix #9: One-command local development stack.
# No Kubernetes required — runs everything via Podman Compose.
#
# Usage:
#   ./scripts/run-dev-local.sh
#   # OR directly:
#   podman-compose -f podman-compose.dev.yaml up -d
#
# What runs:
#   PostgreSQL + PgBouncer (pooler)
#   Redis
#   Kafka + Zookeeper (single broker, dev config)
#   OPA (policy server)
#   Dapr Placement service
#   Jaeger (tracing UI: http://localhost:16686)
#   Grafana + Prometheus (metrics UI: http://localhost:3000)
#
# What does NOT run here (use 'dapr run' for individual services):
#   Application services — start them with 'dapr run' for sidecar injection

version: "3.9"

networks:
  retail-pos-dev:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  kafka_data:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       retail_pos_dev
      POSTGRES_USER:     retail_pos
      POSTGRES_PASSWORD: dev_password_not_for_prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/sql/init-dev-schemas.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks: [retail-pos-dev]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "retail_pos"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PgBouncer (Fix #5: connection pooling) ────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22
    environment:
      DATABASE_URL:   postgres://retail_pos:dev_password_not_for_prod@postgres:5432/retail_pos_dev
      POOL_MODE:      transaction     # Transaction pooling: all tenants share connections
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"   # App connects on 6432, not 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks: [retail-pos-dev]

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass dev_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [retail-pos-dev]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_redis_password", "ping"]
      interval: 5s

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [retail-pos-dev]

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24         # Dev: 24h retention
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [retail-pos-dev]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5

  # ── OPA (Fix #2: Policy server) ───────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.63.0
    command:
      - run
      - --server
      - --watch
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./infrastructure/opa:/policies:ro
    networks: [retail-pos-dev]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 5s

  # ── Dapr Placement (saga + state coordination) ─────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.14.0
    command: ["./placement", "--port", "50005", "--log-level", "warn"]
    ports:
      - "50005:50005"
    networks: [retail-pos-dev]

  # ── Jaeger (distributed tracing UI) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTel gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [retail-pos-dev]

  # ── Prometheus ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infrastructure/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [retail-pos-dev]

  # ── Grafana ────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, jaeger]
    networks: [retail-pos-dev]
