# Fix #5: PgBouncer — connection pooling for multi-tenant PostgreSQL.
#
# Problem: Schema-per-tenant means each tenant needs a search_path SET on each
# connection. In transaction pooling mode, PgBouncer resets session state
# between transactions — the app must SET search_path in each transaction
# (handled by TenantConnectionPool.AcquireAsync using SET LOCAL).
#
# Pool mode: TRANSACTION (not session) — essential for multi-tenant scale.
#   - Session mode: 1 connection per client = pool exhaustion at 200+ tenants
#   - Transaction mode: connections returned to pool after each transaction
#     500 clients can share 20 server connections
#
# Result: 500 tenants × 10 concurrent requests = 5000 potential connections
#         reduced to 50 actual PostgreSQL connections via PgBouncer

[databases]
# All tenants route to the same database
# search_path is set by the application (SET LOCAL) per transaction
retail_pos_dev  = host=postgres  port=5432 dbname=retail_pos_dev
retail_pos_prod = host=postgres  port=5432 dbname=retail_pos

[pgbouncer]
# Pool configuration
pool_mode        = transaction    # CRITICAL: transaction mode for multi-tenant
max_client_conn  = 2000           # Max simultaneous app connections
default_pool_size = 25            # Server connections per database
reserve_pool_size = 5             # Extra connections for bursts
reserve_pool_timeout = 3          # Seconds before using reserve pool

# Connection limits
min_pool_size    = 5              # Keep minimum connections warm
max_db_connections = 100          # Hard cap on PostgreSQL connections

# Auth
auth_type        = scram-sha-256
auth_file        = /etc/pgbouncer/userlist.txt

# Timeouts
client_idle_timeout    = 600      # 10min: idle client connections closed
server_idle_timeout    = 300      # 5min: idle server connections closed
query_timeout          = 30       # 30s: kill queries taking too long
query_wait_timeout     = 10       # 10s: wait for available connection

# Monitoring
stats_period     = 60             # Export stats every 60s
listen_port      = 5432
listen_addr      = *

# Logging
log_connections  = 0              # Reduce noise in production
log_disconnections = 0
log_stats        = 1
